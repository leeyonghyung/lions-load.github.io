const TOTALS = (() => {
  let h = 0, a = 0;
  Object.values(GAMES_2026).flat().forEach(g => {
    if (g.type === "h") h++;
    else if (g.type === "a") a++;
  });
  return { home: h, away: a, total: h + a };
})();

function getNextGame() {
  const now = new Date();
  const year = 2026;
  for (const [month, games] of Object.entries(GAMES_2026)) {
    const monthNum = parseInt(month);
    for (const g of games) {
      if (g.type === "b") continue;
      const day = parseInt(g.date.split(" ")[0].split(".")[1]);
      const [hh, mm] = g.time.split(":").map(Number);
      const gameDate = new Date(year, monthNum - 1, day, hh, mm);
      if (gameDate >= now) return { month, game: g, dateObj: gameDate };
    }
  }
  return { month: "5월", game: GAMES_2026["5월"][0], dateObj: new Date(2026, 4, 1, 18, 30) };
}

function getNextHomeGame() {
  const now = new Date();
  const year = 2026;
  for (const [month, games] of Object.entries(GAMES_2026)) {
    const monthNum = parseInt(month);
    for (const g of games) {
      if (g.type !== "h") continue;
      const day = parseInt(g.date.split(" ")[0].split(".")[1]);
      const [hh, mm] = g.time.split(":").map(Number);
      const gameDate = new Date(year, monthNum - 1, day, hh, mm);
      if (gameDate >= now) return { month, game: g, dateObj: gameDate };
    }
  }
  return null;
}

function daysUntil(targetDate) {
  return Math.floor((targetDate - new Date()) / (1000 * 60 * 60 * 24));
}

function MiniMap({ highlightTo = null }) {
  const minLng = 128.570, maxLng = 128.690;
  const minLat = 35.820, maxLat = 35.890;
  const W = 380, H = 280, PAD = 30;
  const proj = (lat, lng) => {
    const x = PAD + ((lng - minLng) / (maxLng - minLng)) * (W - 2 * PAD);
    const y = PAD + ((maxLat - lat) / (maxLat - minLat)) * (H - 2 * PAD);
    return [x, y];
  };
  const points = Object.entries(LOCATIONS).map(([key, loc]) => ({ key, ...loc, pos: proj(loc.lat, loc.lng) }));
  const dongdaegu = points.find(p => p.key === "dongdaegu");
  const otherPoints = points.filter(p => p.key !== "dongdaegu");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="map-svg">
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f4f8" strokeWidth="1" />
        </pattern>
      </defs>
      <rect width={W} height={H} fill="#fafbfd" />
      <rect width={W} height={H} fill="url(#grid)" />
      <path d={`M ${PAD-10} ${H/2 + 30} Q ${W/3} ${H/2 + 50} ${W/2} ${H/2 + 20} T ${W} ${H/2 + 10}`} stroke="#dde7f0" strokeWidth="14" fill="none" opacity="0.5" />
      {otherPoints.map(p => {
        const isHL = highlightTo === p.key;
        return <line key={p.key} x1={dongdaegu.pos[0]} y1={dongdaegu.pos[1]} x2={p.pos[0]} y2={p.pos[1]} stroke={isHL ? "#0057A8" : "#cfd8e3"} strokeWidth={isHL ? "2.5" : "1.2"} strokeDasharray={isHL ? "0" : "4 3"} />;
      })}
      {otherPoints.map(p => {
        const isHL = highlightTo === p.key;
        const isPark = p.key === "lionsPark";
        return (
          <g key={p.key}>
            <circle cx={p.pos[0]} cy={p.pos[1]} r={isPark ? 11 : 8} fill={isPark ? "#0057A8" : isHL ? "#0057A8" : "white"} stroke={isPark || isHL ? "#0057A8" : "#7a8b9c"} strokeWidth="2" />
            <text x={p.pos[0]} y={p.pos[1] + 1} textAnchor="middle" dominantBaseline="middle" fontSize={isPark ? "11" : "10"}>{p.emoji}</text>
            <text x={p.pos[0]} y={p.pos[1] + (isPark ? 24 : 21)} textAnchor="middle" fontSize="9.5" fontWeight={isPark || isHL ? "700" : "500"} fill={isPark || isHL ? "#0057A8" : "#555"}>{p.name}</text>
          </g>
        );
      })}
      <g>
        <circle cx={dongdaegu.pos[0]} cy={dongdaegu.pos[1]} r="14" fill="#111" />
        <text x={dongdaegu.pos[0]} y={dongdaegu.pos[1] + 1} textAnchor="middle" dominantBaseline="middle" fontSize="13">🚄</text>
        <text x={dongdaegu.pos[0]} y={dongdaegu.pos[1] - 22} textAnchor="middle" fontSize="10.5" fontWeight="700" fill="#111">동대구역</text>
      </g>
      <g transform={`translate(${W - 35}, 28)`}>
        <circle r="12" fill="white" stroke="#dde2e8" strokeWidth="1" />
        <text textAnchor="middle" dominantBaseline="middle" fontSize="9" fontWeight="700" fill="#0057A8">N</text>
      </g>
    </svg>
  );
}

}

.schedule-note { text-align: center; font-size: 12px; color: var(--ink3); margin-top: 10px; padding: 12px; line-height: 1.7; }

function LionsRoadApp() {
  const [tab, setTab] = useState(0);
  const [origin, setOrigin] = useState("서울 강남");
  const [routeTarget, setRouteTarget] = useState("lionsPark");

          <div className="gm-item">

          <div className="gm-sep" />
          <div className="gm-item">

      </div>
      <div className="shortcuts-grid">
        {[
          { icon: "🚄", name: "교통편", t: 1 },
          { icon: "🍖", name: "맛집", t: 2 },
          { icon: "🪑", name: "구장 정보", t: 3 },
          { icon: "📅", name: "경기 일정", t: 4 },
        ].map((s) => (
          <div key={s.t} className="sc-item" onClick={() => setTab(s.t)}>
            <div className="sc-icon">{s.icon}</div>
            <div className="sc-name">{s.name}</div>
          </div>
        ))}
      </div>
      <div className="tip-card">
        <div className="tip-header">
          <span style={{ fontSize: 14 }}>💡</span>
          <span className="tip-label">수도권 팬 주의사항</span>
        </div>
        <div className="tip-text">
          <b>주말 경기 KTX·SRT 좌석</b>은 한 달 전부터 빠르게 매진됩니다.<br />
          귀경 <b>막차 시간</b>을 반드시 미리 확인하세요.<br />
          구장 주변 <b>주차는 경기 3시간 전</b>에 이미 혼잡합니다.
        </div>
      </div>
    </div>
  );

  const TransportTab = () => {

    return (
      <div>
        <div className="sec-title">교통편 안내</div>
        <div className="sec-sub">출발지 → 동대구역 → 목적지 환승 가이드</div>
        <div className="map-card">

          <div className="map-legend">
            <div className="legend-item"><div className="legend-dot" style={{background:"#111"}} /> 동대구역</div>
            <div className="legend-item"><div className="legend-dot" style={{background:"#0057A8"}} /> 라이온즈파크</div>
            <div className="legend-item"><div className="legend-dot" style={{background:"white", border:"2px solid #7a8b9c"}} /> 맛집·관광</div>
          </div>
        </div>
        <div className="dd-section-header">
          <div className="dd-hub-icon">1</div>
          <div className="dd-hub-info">
            <div className="dd-hub-name">수도권 → 동대구역</div>
            <div className="dd-hub-desc">출발지를 선택하세요</div>

        <div className="origin-bar">

        <div className="dd-section-header">

        <div className="route-tab-bar">

          ))}
        </div>
      </div>

  };

  const FoodTab = () => (
    <div>
      <div className="sec-title">맛집 & 먹거리</div>
      <div className="sec-sub">동대구역 도착 후 들르기 좋은 곳</div>
      <div className="map-card">
        <div className="map-card-title">🗺 맛집 위치 한눈에 보기</div>
        <MiniMap />
      </div>
      {RESTAURANTS.map((r, i) => (
        <div key={i} className={`r-card ${r.highlight ? "featured" : ""}`}>
          {r.highlight && <div className="r-highlight">{r.highlight}</div>}
          <div className="r-top">
            <div>

            <div className="r-cat">{r.cat}</div>

          <div className="r-desc">{r.desc}</div>

            <div className="r-price">{r.price}</div>
          </div>
        </div>

    </div>
  );

  const ParkTab = () => (
    <div>
      <div className="park-hero">
        <div className="park-hero-emoji">🏟️</div>
        <div>
          <div className="park-hero-name">대구삼성<br />라이온즈파크</div>
          <div className="park-hero-addr">대구 수성구 야구전설로 1<br />수용 인원 약 29,000명</div>
        </div>
      </div>
      <div className="park-section">
        <div className="park-section-title">좌석 구성</div>
        <div className="seat-grid">
          {PARK.seats.map((s, i) => (
            <div key={i} className="seat-card">
              <div className="seat-zone">{s.zone}</div>
              <div className="seat-desc">{s.desc}</div>
              {s.tag && <div className="seat-tag">{s.tag}</div>}

        <div className="park-section-title">오시는 길 & 주차</div>

      <div className="park-section">
        <div className="park-section-title">꼭 알아두세요</div>
        <div className="tips-list">
          {PARK.tips.map((t, i) => (
            <div key={i} className="tip-item">
              <span className="tip-bullet">—</span>
              <span>{t}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  const ScheduleTab = () => {
    const games = GAMES_2026[selectedMonth] || [];
    const homeCount = games.filter(g => g.type === "h").length;
    const awayCount = games.filter(g => g.type === "a").length;
    const filteredGames = games.filter(g => {
      if (filter === "home") return g.type === "h";
      if (filter === "away") return g.type === "a";
      return true; // all = 홈+원정+브레이크
    });
    const isNextGame = (g) => selectedMonth === next.month && g.date === next.game.date;

    return (
      <div>
        <div className="sec-title">2026 KBO 시즌</div>
        <div className="sec-sub">삼성 라이온즈 · 공식 일정 기준</div>

              </div>

          }
          const isHome = g.type === "h";
          const isAway = g.type === "a";
          const isSpecial = g.note && g.note !== "주말" && g.note !== "";
          const isNext = isNextGame(g);
          return (
            <div key={i} className={`g-row ${isHome ? "home" : "away"} ${isNext ? "next" : ""}`}>

              <div className="g-opp">
                <div className="g-vs">{isHome ? "vs (홈)" : "@ (원정)"}</div>
                <div className="g-opp-name">{g.opp}</div>
                <div className="g-venue">📍 {g.venue}</div>
              </div>
              <div className="g-tags">
                {isNext && <div className="g-tag tag-next">NEXT</div>}
                <div className={`g-tag ${isHome ? "tag-home" : "tag-away"}`}>{isHome ? "홈" : "원정"}</div>
                {isSpecial && <div className="g-tag tag-special">{g.note}</div>}
              </div>
            </div>
          );
        })}

        <div className="schedule-note">
          전체 정규시즌 144경기 중 5~9월 일정 표시<br />
          홈경기는 모두 대구 라이온즈파크 개최<br />
          원정 경기장: 잠실(LG/두산), 고척(키움), 문학(SSG),<br />
          수원(KT), 대전(한화), 광주(KIA), 사직(롯데), 창원(NC)
        </div>
      </div>
    );
  };

  const PAGES = [HomeTab, TransportTab, FoodTab, ParkTab, ScheduleTab];
  const Page = PAGES[tab];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="header">
          <div className="hd-left">
            <div className="hd-dot" />
            <div>
              <div className="hd-title">Lions Road</div>
              <div className="hd-sub">수도권 팬 직관 가이드 2026</div>
            </div>
          </div>
          <div className="hd-badge">🦁 삼성 라이온즈</div>
        </div>
        <div className="content">
          <Page />
        </div>
        <div className="nav">
          {NAV.map((n, i) => (
            <div key={i} className={`nav-item ${tab === i ? "active" : ""}`} onClick={() => setTab(i)}>
              <div className="nav-dot">{n.icon}</div>
              <div className="nav-lbl">{n.label}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LionsRoadApp />);
  </script>
</body>
</html>
